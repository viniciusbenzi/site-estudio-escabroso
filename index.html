<html>
    <header>
        <title>Estudio Escabroso</title>

        <style>
            body, .container, html{
                margin: 0;
                padding: 0;
            }

            .container{
                z-index: 1;
            }

            .logo {
                display: block;
                height: 300px;
                width: 100%;
                opacity: 0.8;
                text-align: center;
                overflow: hidden;
            }

            .logo img {
                color: #312f30;
            }

            .press-kit {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .press-kit a {
                display: block;
                margin: 0 20px;
                font-size: 20px;
                color: #312f30;
                z-index: 1000;
            }

            .social-media {
                min-width: 800px;
                margin: 20px 20px 50px;
            }

            .social-media div {
                display: block;
                height: 50px;
                margin: 20px 0;
                padding: 10px 0;
                border-radius: 20px;
                border:5px dotted;
                text-align: center;
            }

            .social-media div a {
                display: inline-block;
                width: 100%;
                color: #312f30;
            }

            .social-media div:hover {
                border:4px solid #312f30;
            }

            .social-media div a span {
                float: left;
                margin: 10px;
                font-size: 30px;
            }

            .social-media div a img {
                float: right;
                width: 50px;
                opacity: 0.8;
            }

            .filter {
                background: url(./filtro_003.png) no-repeat; background-size: cover;
            }
        </style>
    </header>
    <body class="filter">
        <div class="container">
            <div class="logo">
                <img src="./logo-escabroso.svg" alt="Estudio Escabroso" width="500px">
            </div>
            <div class="social-media">
                <div>
                    <a href="./apresentacao.pdf" target="_blank"><span>APRESENTAÇÃO</span></a>
                </div>
                <div>
                    <a href="./calum.html" target="_blank"><span>VIDEOS</span></a>
                </div>
                <div>
                    <a href="https://viniciusbenzi.itch.io/calum" target="_blank"><span>DEMO (itch.io)</span></a>
                </div>
                <div>
                    <a href="https://www.instagram.com/estudio.escabroso/" target="_blank">
                        <span>INSTAGRAM</span><img src="./instagram.png" alt="Instagram"></a>
                </div>
                <div>
                    <a href="https://www.youtube.com/@EstudioEscabroso" target="_blank">
                        <span>YOUTUBE</span><img src="./youtube.png" alt="Youtuber" target="_blank"></a>
                </div>
                <div>
                    <a href="https://bsky.app/profile/estudio-escabroso.bsky.social" target="_blank">
                        <span>BLUESKY</span><img src="./blue-sky.png" alt="Bluesky" target="_blank"></a>
                </div>
            </div> 
        </div>        
    </body>
</html>
